PowerLawMultipole:
  m:
    type: Constant
    value: 4
  centre_0:
    type: Gaussian
    mean: 0.0
    sigma: 0.1
    width_modifier:
      type: Absolute
      value: 0.05
    limits:
      lower: -inf
      upper: inf
  centre_1:
    type: Gaussian
    mean: 0.0
    sigma: 0.1
    width_modifier:
      type: Absolute
      value: 0.05
    limits:
      lower: -inf
      upper: inf
  einstein_radius:
    type: Uniform
    lower_limit: 0.0
    upper_limit: 8.0
    width_modifier:
      type: Relative
      value: 0.25
    limits:
      lower: 0.0
      upper: inf
  slope:
    type: Uniform
    lower_limit: 1.5
    upper_limit: 3.0
    width_modifier:
      type: Absolute
      value: 0.2
    limits:
      lower: 1.0
      upper: 3.0
  multipole_comps_0:
    type: Uniform
    lower_limit: -0.1
    upper_limit: 0.1
    width_modifier:
      type: Absolute
      value: 0.05
    limits:
      lower: -inf
      upper: inf
  multipole_comps_1:
    type: Uniform
    lower_limit: -0.1
    upper_limit: 0.1
    width_modifier:
      type: Absolute
      value: 0.05
    limits:
      lower: -inf
      upper: inf
